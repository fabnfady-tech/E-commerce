<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم متجر فادي العالمي | Fadi Store Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <nav class="bg-white shadow-xs border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <span class="text-2xl font-black text-indigo-600 tracking-wider cursor-pointer"
                    onclick="switchPage('store')">FADI MEGA STORE</span>
                <div class="hidden md:flex items-center gap-6 font-medium text-sm">
                    <button onclick="switchPage('store')" id="nav-store" class="text-indigo-600 font-bold">🏪
                        المتجر</button>
                    <button onclick="switchPage('cart')" id="nav-cart" class="text-gray-600">🛒 السلة <span
                            id="cart-count"
                            class="bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-bold">0</span></button>
                    <button onclick="switchPage('orders')" id="nav-orders" class="text-gray-600">📦 طلباتي</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="switchPage('login')" id="nav-login"
                        class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">🔑 دخول</button>
                    <button onclick="switchPage('register')" id="nav-register"
                        class="bg-white border border-indigo-600 text-indigo-600 px-4 py-2 rounded-lg text-sm">✨ حساب
                        جديد</button>
                    <button onclick="handleLogout()" id="nav-logout"
                        class="hidden bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm">خروج</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <!-- صفحة المتجر -->
        <section id="page-store" class="page-view">
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            <div class="flex justify-center gap-4 mt-12">
                <button id="prev-btn" class="bg-white border px-4 py-2 rounded-lg disabled:opacity-50">السابق</button>
                <button id="next-btn" class="bg-white border px-4 py-2 rounded-lg disabled:opacity-50">التالي</button>
            </div>
        </section>

        <!-- صفحة تفاصيل المنتج -->
        <section id="page-details" class="page-view hidden">
            <button onclick="switchPage('store')" class="mb-6 text-indigo-600 font-bold">← العودة للمتجر</button>
            <div id="product-details-content" class="bg-white p-8 rounded-2xl shadow-lg border"></div>
        </section>

        <!-- صفحة السلة -->
        <section id="page-cart" class="page-view hidden">
            <div class="bg-white border rounded-xl p-6 shadow-xs max-w-3xl">
                <div id="cart-items" class="divide-y"></div>
                <div class="border-t pt-4 mt-6 flex justify-between font-bold text-lg">
                    <span>الإجمالي:</span>
                    <span id="cart-total" class="text-indigo-600">0 ج.م</span>
                </div>
                <button onclick="checkoutOrder()"
                    class="w-full bg-emerald-600 text-white mt-6 py-3 rounded-xl font-bold">💳 تأكيد الطلب</button>
            </div>
        </section>

        <!-- صفحة الطلبات -->
        <section id="page-orders" class="page-view hidden">
            <div id="orders-list" class="space-y-4"></div>
        </section>

        <!-- صفحة تسجيل الدخول -->
        <section id="page-login" class="page-view hidden">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm">
                <h2 class="text-2xl font-black text-indigo-600 mb-6 text-center">🔑 تسجيل الدخول</h2>
                <div id="login-error" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4"></div>
                <input type="text" id="login-username" placeholder="اسم المستخدم"
                    class="w-full border rounded-lg p-3 mb-4 text-right focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <input type="password" id="login-password" placeholder="كلمة المرور"
                    class="w-full border rounded-lg p-3 mb-6 text-right focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <button onclick="handleLogin()"
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">دخول</button>
                <p class="text-center text-sm text-gray-500 mt-4">
                    مش عندك حساب؟
                    <button onclick="switchPage('register')" class="text-indigo-600 font-bold">إنشاء حساب</button>
                </p>
            </div>
        </section>

        <!-- صفحة إنشاء حساب -->
        <section id="page-register" class="page-view hidden">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm">
                <h2 class="text-2xl font-black text-indigo-600 mb-6 text-center">✨ إنشاء حساب جديد</h2>
                <div id="register-error" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4"></div>
                <div id="register-success" class="hidden bg-green-50 text-green-600 text-sm p-3 rounded-lg mb-4"></div>
                <input type="text" id="reg-username" placeholder="اسم المستخدم"
                    class="w-full border rounded-lg p-3 mb-4 text-right focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <input type="email" id="reg-email" placeholder="البريد الإلكتروني (اختياري)"
                    class="w-full border rounded-lg p-3 mb-4 text-right focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <input type="password" id="reg-password" placeholder="كلمة المرور"
                    class="w-full border rounded-lg p-3 mb-4 text-right focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <input type="password" id="reg-password2" placeholder="تأكيد كلمة المرور"
                    class="w-full border rounded-lg p-3 mb-6 text-right focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <button onclick="handleRegister()"
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">إنشاء
                    الحساب</button>
                <p class="text-center text-sm text-gray-500 mt-4">
                    عندك حساب بالفعل؟
                    <button onclick="switchPage('login')" class="text-indigo-600 font-bold">تسجيل الدخول</button>
                </p>
            </div>
        </section>

    </main>

    <script>
        const BASE_URL = window.location.origin;
        let currentNextUrl = `${BASE_URL}/products/`;
        let currentPrevUrl = null;
        let localCart = [];

        // ===== Auth Helpers =====
        function getToken() { return localStorage.getItem('access_token'); }
        function setTokens(access, refresh) {
            localStorage.setItem('access_token', access);
            localStorage.setItem('refresh_token', refresh);
        }
        function clearTokens() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('username');
        }
        function updateNavForAuth() {
            const token = getToken();
            const username = localStorage.getItem('username');
            document.getElementById('nav-login').classList.toggle('hidden', !!token);
            document.getElementById('nav-register').classList.toggle('hidden', !!token);
            document.getElementById('nav-logout').classList.toggle('hidden', !token);
            if (token && username) {
                document.getElementById('nav-logout').textContent = `خروج (${username})`;
            }
        }

        // ===== تسجيل الدخول =====
        async function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.classList.add('hidden');

            if (!username || !password) {
                errorDiv.textContent = 'من فضلك ادخل اسم المستخدم وكلمة المرور';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/api/token/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    setTokens(data.access, data.refresh);
                    localStorage.setItem('username', username);
                    updateNavForAuth();
                    switchPage('store');
                } else {
                    errorDiv.textContent = 'اسم المستخدم أو كلمة المرور غلط';
                    errorDiv.classList.remove('hidden');
                }
            } catch {
                errorDiv.textContent = 'في مشكلة في الاتصال، حاول تاني';
                errorDiv.classList.remove('hidden');
            }
        }

        // ===== إنشاء حساب =====
        async function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;
            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            if (!username || !password) {
                errorDiv.textContent = 'اسم المستخدم وكلمة المرور مطلوبين';
                errorDiv.classList.remove('hidden');
                return;
            }
            if (password !== password2) {
                errorDiv.textContent = 'كلمة المرور مش متطابقة';
                errorDiv.classList.remove('hidden');
                return;
            }
            if (password.length < 8) {
                errorDiv.textContent = 'كلمة المرور لازم تكون 8 حروف على الأقل';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/api/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    successDiv.textContent = 'تم إنشاء الحساب! جاري تسجيل دخولك...';
                    successDiv.classList.remove('hidden');
                    // تسجيل دخول تلقائي بعد إنشاء الحساب
                    setTimeout(async () => {
                        const loginRes = await fetch(`${BASE_URL}/api/token/`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });
                        const loginData = await loginRes.json();
                        if (loginRes.ok) {
                            setTokens(loginData.access, loginData.refresh);
                            localStorage.setItem('username', username);
                            updateNavForAuth();
                            switchPage('store');
                        }
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || 'في مشكلة، حاول تاني';
                    errorDiv.classList.remove('hidden');
                }
            } catch {
                errorDiv.textContent = 'في مشكلة في الاتصال، حاول تاني';
                errorDiv.classList.remove('hidden');
            }
        }

        // ===== تسجيل الخروج =====
        function handleLogout() {
            clearTokens();
            updateNavForAuth();
            switchPage('store');
        }

        // ===== التنقل بين الصفحات =====
        function switchPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');

            if (pageId === 'store') fetchProducts(`${BASE_URL}/products/`);

            if (pageId === 'cart') {
                const cartContainer = document.getElementById('cart-items');
                const totalElement = document.getElementById('cart-total');
                cartContainer.innerHTML = '';
                let total = 0;
                localCart.forEach(item => {
                    total += parseFloat(item.price);
                    cartContainer.innerHTML += `
                        <div class="py-3 flex justify-between">
                            <span>${item.title}</span>
                            <span class="font-bold">${item.price} ج.م</span>
                        </div>`;
                });
                totalElement.innerText = `${total} ج.م`;
            }
        }

        // ===== المنتجات =====
        async function fetchProducts(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const products = data.results ? data.results : data;

                currentNextUrl = data.next;
                currentPrevUrl = data.previous;
                document.getElementById('next-btn').disabled = !currentNextUrl;
                document.getElementById('prev-btn').disabled = !currentPrevUrl;

                const grid = document.getElementById('products-grid');
                grid.innerHTML = '';
                products.forEach(product => {
                    grid.innerHTML += `
                        <div onclick="viewProductDetails(${product.id})" class="bg-white rounded-xl border shadow-2xs p-5 hover:shadow-md transition cursor-pointer">
                            <img src="${product.image}" alt="${product.title}" class="h-40 w-full object-cover rounded-lg mb-4">
                            <h3 class="font-bold text-gray-900 mb-1">${product.title}</h3>
                            <div class="flex justify-between items-center pt-3 mt-auto">
                                <span class="font-black text-gray-900">${product.price} ج.م</span>
                                <button onclick="event.stopPropagation(); addToCart('${product.title}', ${product.price})" 
                                    class="bg-indigo-600 text-white text-xs px-2 py-1 rounded">＋ السلة</button>
                            </div>
                        </div>`;
                });
            } catch (err) { console.error(err); }
        }

        async function viewProductDetails(productId) {
            const content = document.getElementById('product-details-content');
            content.innerHTML = '<p class="text-center">جاري التحميل...</p>';
            switchPage('details');
            try {
                const response = await fetch(`${BASE_URL}/products/${productId}/`);
                const product = await response.json();
                content.innerHTML = `
                    <div class="grid md:grid-cols-2 gap-8">
                        <img src="${product.image}" class="w-full h-80 object-cover rounded-xl">
                        <div>
                            <h2 class="text-3xl font-black mb-2">${product.title}</h2>
                            <p class="text-indigo-600 text-xl mb-4">${product.price} ج.م</p>
                            <p class="text-gray-600 mb-6">${product.description || 'لا يوجد وصف'}</p>
                            <button onclick="addToCart('${product.title}', ${product.price})" 
                                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">
                                ＋ إضافة للسلة
                            </button>
                        </div>
                    </div>`;
            } catch (err) { content.innerHTML = '<p>خطأ في تحميل المنتج.</p>'; }
        }

        function addToCart(title, price) {
            localCart.push({ title, price });
            document.getElementById('cart-count').innerText = localCart.length;
            alert('تمت الإضافة للسلة!');
        }

        function checkoutOrder() { alert('تم تأكيد الطلب!'); localCart = []; switchPage('store'); }

        document.getElementById('next-btn').addEventListener('click', () => { if (currentNextUrl) fetchProducts(currentNextUrl); });
        document.getElementById('prev-btn').addEventListener('click', () => { if (currentPrevUrl) fetchProducts(currentPrevUrl); });

        // تشغيل أول ما الصفحة تفتح
        fetchProducts(`${BASE_URL}/products/`);
        updateNavForAuth();
    </script>
</body>

</html>
